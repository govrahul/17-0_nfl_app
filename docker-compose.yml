services:
  game:
    build:
      context: .
      dockerfile: Dockerfile.game
    ports:
      - "8000:8000"

  # Data-refresh pipeline -- not needed to play the game (Data/game_pool.json
  # is already committed), only run this if you want to pull fresh seasons.
  # Usage: docker compose --profile scrape up scraper
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    profiles: ["scrape"]
    environment:
      - LOG_LEVEL=info
    ports:
      - "8191:8191"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper:
    build: .
    profiles: ["scrape"]
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    volumes:
      - ./Scrapers/Data:/app/Data
    depends_on:
      flaresolverr:
        condition: service_healthy
